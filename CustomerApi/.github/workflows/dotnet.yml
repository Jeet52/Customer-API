name: Build and Deploy ASP.NET Core Web API

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore ./CustomerApi/CustomerApi.csproj

    - name: Build
      run: dotnet build ./CustomerApi/CustomerApi.csproj --configuration Release --no-restore

    - name: Test
      run: dotnet test ./CustomerApi/CustomerApi.csproj --no-build --verbosity normal

    - name: Publish
      run: dotnet publish ./CustomerApi/CustomerApi.csproj -c Release -o publish_output

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'customer-api-app'      # Replace with your Azure Web App name
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish_output
